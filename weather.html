<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Weather Checking</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<img src="LOGO.jpg" class="logo">

<h1 class="main-title">Online Weather Checking</h1>

<div class="main-layout">

<div class="side-cards" id="leftCards"></div>

<div class="weather-box">

<h2 class="title">
<i class="fa-solid fa-cloud-sun"></i> Weather App
</h2>

<div class="search-box">
<input type="text" id="city" placeholder="Enter city name">
<button id="searchBtn">
<i class="fa-solid fa-magnifying-glass"></i>
</button>
</div>

<div class="weather-info">
<img id="weatherIcon" src="">
<h2 id="cityName">Jalalabad</h2>
<div class="temp"><span id="temperature">32</span>°C</div>
<p id="description">clear sky</p>

<div class="details">
<div class="card">
<p>Humidity</p>
<span id="humidity">40%</span>
</div>

<div class="card">
<p>Wind</p>
<span id="wind">12 km/h</span>
</div>
</div>

</div>
</div>

<div class="side-cards" id="rightCards"></div>

</div>

<footer>Aryan Khalil</footer>

<script src="script.js"></script>

</body>
</html>
